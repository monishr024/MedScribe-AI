<div class="{{ column }} mb-4">

    <label class="form-label">

        {{ label }}

        {% if required %}
            <span class="text-danger">*</span>
        {% endif %}

    </label>

    <input

        type="{{ type }}"

        class="form-control"

        id="{{ id }}"

        name="{{ name }}"

        placeholder="{{ placeholder }}"

        {% if required %}
        required
        {% endif %}

    >

</div>
